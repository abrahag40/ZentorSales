<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1614">
<meta name="description" content="La Biblia del Vendedor de Zentor — instrumento de campo de ZaharDev.">
<title>Biblia del Vendedor · Zentor</title>
<style>
/* ============================================================
   ZENTOR · LA BIBLIA DEL VENDEDOR — Instrumento de campo
   Producto ZaharDev · Diseño first-mobile, offline, sin deps
   ============================================================ */

:root{
  /* Base: tinta profunda con matiz teal (la "nube" de Zentor, de noche) */
  --ink:        #0E1614;
  --ink-2:      #14201D;
  --surface:    #16221F;
  --surface-2:  #1B2A26;
  --line:       #25372F;
  --line-soft:  #1F302B;

  /* Texto: hueso/pergamino sobre tinta */
  --bone:       #ECE7DB;
  --bone-2:     #C2C8C0;
  --dim:        #8C968E;
  --faint:      #5E6A63;

  /* Marca: el ORO de la biblia (valor, cierre, acento) */
  --gold:       #E8B04B;
  --gold-2:     #F2C66E;
  --gold-deep:  #B9842B;
  --gold-glow:  rgba(232,176,75,.16);

  /* Sistema de VERDAD (regla de oro de marca) */
  --jade:       #4FB286;   /* ✅ construido — lo real */
  --jade-soft:  rgba(79,178,134,.14);
  --steel:      #6FA0BE;   /* 🔜 en camino — la visión */
  --steel-soft: rgba(111,160,190,.14);

  /* Señales competidor (heredan el código de la biblia) */
  --c-aspel:    #E0584E;
  --c-contpaq:  #5B8DEF;
  --c-bind:     #46B97A;
  --c-alegra:   #E5C04A;
  --c-sinube:   #E08A3C;
  --c-odoo:     #A77BD6;
  --c-pulpos:   #8A938C;

  --danger:     #E0584E;

  --radius:     16px;
  --radius-sm:  11px;
  --radius-lg:  22px;
  --shadow:     0 1px 0 rgba(255,255,255,.03) inset, 0 18px 40px -24px rgba(0,0,0,.9);
  --shadow-pop: 0 24px 60px -20px rgba(0,0,0,.85);

  --f-display: -apple-system, "SF Pro Display", "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
  --f-body:    -apple-system, "SF Pro Text", "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
  --f-mono:    "SF Mono", "JetBrains Mono", "Cascadia Code", ui-monospace, Menlo, Consolas, monospace;

  --shell-max: 480px;
  --nav-h: 70px;
  --top-h: 54px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
html{ background:#070C0A; -webkit-text-size-adjust:100%; }
body{
  font-family:var(--f-body);
  color:var(--bone);
  background:var(--ink);
  line-height:1.5;
  font-size:16px;
  letter-spacing:.005em;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{ font-family:inherit; color:inherit; cursor:pointer; border:none; background:none; }
input{ font-family:inherit; }
::selection{ background:var(--gold); color:var(--ink); }

/* atmosphere: faint gilded vignette + grain */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(120% 60% at 50% -10%, rgba(232,176,75,.07), transparent 60%),
    radial-gradient(90% 50% at 50% 110%, rgba(79,178,134,.05), transparent 60%);
}

/* ===================== SHELL ===================== */
#app{
  position:relative; z-index:1;
  max-width:var(--shell-max); margin:0 auto; min-height:100dvh;
  background:var(--ink);
  box-shadow:0 0 0 1px rgba(255,255,255,.02), 0 40px 120px -40px rgba(0,0,0,.9);
  display:flex; flex-direction:column;
  overflow:hidden;
}
@media(min-width:520px){
  #app{ min-height:calc(100dvh - 40px); margin:20px auto; border-radius:28px; border:1px solid var(--line-soft); }
  html{ background:#05080700; background-color:#06090800; }
  body{ background:#070C0A; }
}

.topbar{
  position:sticky; top:0; z-index:40;
  height:calc(var(--top-h) + var(--safe-t)); padding-top:var(--safe-t);
  display:flex; align-items:center; justify-content:space-between;
  padding-left:18px; padding-right:14px;
  background:linear-gradient(180deg, rgba(14,22,20,.97), rgba(14,22,20,.82));
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line-soft);
}
.brandmark{ display:flex; align-items:center; gap:9px; min-width:0; }
.brandmark .z{
  width:26px;height:26px;border-radius:8px;flex:0 0 auto;
  display:grid;place-items:center;
  background:linear-gradient(150deg,var(--gold-2),var(--gold-deep));
  color:#1a1206; font-family:var(--f-display); font-weight:900; font-size:16px;
  box-shadow:0 4px 12px -4px rgba(232,176,75,.5), 0 0 0 1px rgba(255,255,255,.12) inset;
}
.brandmark .wm{ min-width:0; }
.brandmark .wm b{
  display:block; font-family:var(--f-display); font-weight:800; font-size:13.5px;
  letter-spacing:.14em; text-transform:uppercase; line-height:1; color:var(--bone);
}
.brandmark .wm small{
  display:block; font-family:var(--f-mono); font-size:9.5px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--gold); margin-top:3px;
}
.topbar .tb-action{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  color:var(--bone-2); border:1px solid var(--line-soft);
}
.topbar .tb-action:active{ background:var(--surface); }

/* main scroll area */
main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 18px);
  scroll-behavior:smooth;
}
.view{ animation:viewin .34s cubic-bezier(.2,.7,.2,1); }
@keyframes viewin{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
.pad{ padding:18px; }
.pad-x{ padding-left:18px; padding-right:18px; }

/* ===================== BOTTOM NAV ===================== */
.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:var(--shell-max); z-index:50;
  height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b);
  display:grid; grid-template-columns:repeat(4,1fr);
  background:linear-gradient(180deg, rgba(16,24,22,.82), rgba(11,17,15,.98));
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line-soft);
}
.tabbar .tab{
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  color:var(--faint); font-size:10.5px; font-weight:600; letter-spacing:.03em;
  position:relative; transition:color .2s;
}
.tabbar .tab svg{ width:23px;height:23px; transition:transform .2s; }
.tabbar .tab.on{ color:var(--gold); }
.tabbar .tab.on svg{ transform:translateY(-1px); }
.tabbar .tab.on::before{
  content:""; position:absolute; top:8px; width:30px; height:30px; border-radius:50%;
  background:var(--gold-glow); filter:blur(2px); z-index:-1;
}
.tabbar .tab:active{ color:var(--gold-2); }

/* ===================== TYPE ===================== */
.eyebrow{
  font-family:var(--f-mono); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--gold); font-weight:600;
}
.eyebrow.muted{ color:var(--dim); }
h1.disp{
  font-family:var(--f-display); font-weight:900; letter-spacing:-.02em; line-height:1.02;
  font-size:clamp(30px,8.5vw,40px); margin:8px 0 0; text-wrap:balance;
}
h2.sec{
  font-family:var(--f-display); font-weight:800; letter-spacing:-.01em; line-height:1.08;
  font-size:22px; margin:0 0 2px;
}
h3.card-t{ font-family:var(--f-display); font-weight:800; font-size:17px; letter-spacing:-.01em; margin:0; }
p.lead{ color:var(--bone-2); font-size:15.5px; line-height:1.6; }
.kicker-n{ font-family:var(--f-mono); color:var(--gold); font-weight:600; }

/* ===================== TAGS / STATUS ===================== */
.tag{
  display:inline-flex; align-items:center; gap:5px; font-family:var(--f-mono);
  font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:4px 9px; border-radius:999px; border:1px solid transparent; white-space:nowrap;
}
.tag .dot{ width:6px;height:6px;border-radius:50%; }
.tag.built{ color:var(--jade); background:var(--jade-soft); border-color:rgba(79,178,134,.3); }
.tag.built .dot{ background:var(--jade); box-shadow:0 0 8px var(--jade); }
.tag.road{ color:var(--steel); background:var(--steel-soft); border-color:rgba(111,160,190,.3); }
.tag.road .dot{ background:var(--steel); box-shadow:0 0 8px var(--steel); }
.tag.gold{ color:var(--gold); background:var(--gold-glow); border-color:rgba(232,176,75,.32); }

/* ===================== CARD ===================== */
.card{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.card.pad{ padding:16px; }
.card-btn{ width:100%; text-align:left; }
.card-btn:active{ transform:scale(.985); transition:transform .1s; }

/* a "scripture" content card */
.scripture p{ color:var(--bone-2); font-size:15.5px; line-height:1.62; margin:0 0 13px; }
.scripture p:last-child{ margin-bottom:0; }
.scripture strong, .scripture b{ color:var(--bone); font-weight:700; }
.scripture em{ color:var(--gold-2); font-style:normal; font-weight:500; }
.scripture ul, .scripture ol{ margin:0 0 14px; padding-left:0; list-style:none; }
.scripture li{
  position:relative; padding-left:20px; margin-bottom:9px; color:var(--bone-2);
  font-size:15px; line-height:1.55;
}
.scripture li::before{
  content:""; position:absolute; left:3px; top:9px; width:6px;height:6px;border-radius:2px;
  background:var(--gold); transform:rotate(45deg); opacity:.9;
}
.scripture ol{ counter-reset:s; }
.scripture ol > li{ counter-increment:s; padding-left:30px; }
.scripture ol > li::before{
  content:counter(s); top:0; left:0; width:20px;height:20px;border-radius:6px; transform:none;
  background:var(--ink-2); border:1px solid var(--line); color:var(--gold);
  font-family:var(--f-mono); font-size:11px; font-weight:600;
  display:grid; place-items:center;
}

/* quote / regla de oro */
.quote{
  border-left:2px solid var(--gold); padding:12px 14px; margin:14px 0;
  background:linear-gradient(90deg, var(--gold-glow), transparent 80%);
  border-radius:0 12px 12px 0; color:var(--bone); font-size:14.5px; line-height:1.55;
}
.quote .ql{ font-family:var(--f-mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:6px; }

/* mini data table */
.dtable{ width:100%; border-collapse:collapse; font-size:13.5px; margin:6px 0 4px; }
.dtable th, .dtable td{ text-align:left; padding:9px 10px; vertical-align:top; border-bottom:1px solid var(--line-soft); }
.dtable th{ font-family:var(--f-mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); font-weight:600; }
.dtable td:first-child{ color:var(--bone); font-weight:600; width:42%; }
.dtable td{ color:var(--bone-2); }
.dtable tr:last-child td{ border-bottom:none; }

/* ===================== HOME ===================== */
.creed{
  position:relative; overflow:hidden; border-radius:var(--radius-lg);
  border:1px solid rgba(232,176,75,.22);
  background:
    radial-gradient(120% 90% at 80% 0%, rgba(232,176,75,.1), transparent 55%),
    linear-gradient(165deg, var(--surface-2), var(--ink-2));
  padding:22px 20px 20px;
}
.creed .seal{ position:absolute; right:-26px; top:-22px; width:140px;height:140px; opacity:.9; }
.creed h1.disp{ position:relative; }
.creed .gold-rule{ height:2px; width:46px; background:linear-gradient(90deg,var(--gold),transparent); margin:14px 0 12px; border-radius:2px; }

.qgrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.qtile{
  position:relative; padding:15px 14px; border-radius:var(--radius); min-height:104px;
  background:var(--surface); border:1px solid var(--line-soft);
  display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
}
.qtile:active{ transform:scale(.97); transition:.1s; }
.qtile .ico{ width:34px;height:34px;border-radius:10px; display:grid;place-items:center; margin-bottom:auto;
  background:var(--ink-2); border:1px solid var(--line); color:var(--gold); }
.qtile . qt-t{ }
.qtile b{ display:block; font-family:var(--f-display); font-weight:800; font-size:15px; margin-top:12px; }
.qtile small{ display:block; color:var(--dim); font-size:11.5px; margin-top:2px; line-height:1.3; }
.qtile.accent{ background:linear-gradient(160deg, rgba(232,176,75,.16), var(--surface)); border-color:rgba(232,176,75,.28); }
.qtile.accent .ico{ background:linear-gradient(150deg,var(--gold-2),var(--gold-deep)); color:#1a1206; border:none; }

/* progress ring */
.progress-card{ display:flex; align-items:center; gap:16px; }
.ring{ position:relative; width:74px;height:74px; flex:0 0 auto; }
.ring svg{ transform:rotate(-90deg); }
.ring .pct{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--f-mono); font-weight:700; font-size:17px; color:var(--gold); }
.progress-card .pc-meta b{ font-family:var(--f-display); font-size:15px; font-weight:800; display:block; }
.progress-card .pc-meta small{ color:var(--dim); font-size:12.5px; }

/* section heading row */
.sechead{ display:flex; align-items:baseline; justify-content:space-between; margin:26px 2px 12px; }
.sechead .eyebrow{ }
.sechead .link{ color:var(--gold); font-size:12.5px; font-weight:600; font-family:var(--f-mono); letter-spacing:.04em; }

/* ===================== LIST ROWS ===================== */
.rowlist{ display:flex; flex-direction:column; gap:10px; }
.row{
  display:flex; align-items:center; gap:13px; padding:14px; border-radius:var(--radius);
  background:var(--surface); border:1px solid var(--line-soft); width:100%; text-align:left;
}
.row:active{ transform:scale(.985); transition:.1s; }
.row .rl{ flex:0 0 auto; width:40px;height:40px;border-radius:11px; display:grid;place-items:center;
  font-size:20px; background:var(--ink-2); border:1px solid var(--line); }
.row .rc{ min-width:0; flex:1; }
.row .rc b{ display:block; font-family:var(--f-display); font-weight:700; font-size:15.5px; line-height:1.2; }
.row .rc small{ display:block; color:var(--dim); font-size:12.5px; margin-top:3px; line-height:1.35; }
.row .ra{ flex:0 0 auto; color:var(--faint); }
.row .chev{ width:18px;height:18px; }

/* part index marker */
.partmark{
  flex:0 0 auto; width:44px;height:44px;border-radius:12px; display:grid;place-items:center;
  font-family:var(--f-display); font-weight:900; font-size:18px; color:var(--gold);
  background:var(--ink-2); border:1px solid var(--line);
}

/* ===================== CHIPS (industria selector) ===================== */
.chiprow{ display:flex; gap:8px; overflow-x:auto; padding:2px 18px 4px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.chiprow::-webkit-scrollbar{ display:none; }
.chip{
  flex:0 0 auto; display:inline-flex; align-items:center; gap:7px;
  padding:9px 14px; border-radius:999px; font-size:13.5px; font-weight:600; white-space:nowrap;
  background:var(--surface); border:1px solid var(--line-soft); color:var(--bone-2);
}
.chip .e{ font-size:15px; }
.chip.on{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
.chip.on .star{ color:var(--ink); }
.chip .star{ color:var(--gold); font-size:11px; }

/* ===================== FICHA DETAIL ===================== */
.ficha-hero{
  border-radius:var(--radius-lg); padding:20px; position:relative; overflow:hidden;
  background:linear-gradient(160deg, var(--surface-2), var(--ink-2)); border:1px solid var(--line);
}
.ficha-hero .big-e{ font-size:40px; line-height:1; }
.block{ margin-top:14px; }
.block-h{ font-family:var(--f-mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; display:flex; align-items:center; gap:7px; }
.block-h .ln{ flex:1; height:1px; background:var(--line); }
.vocab{ display:flex; flex-wrap:wrap; gap:7px; }
.vocab span{ font-family:var(--f-mono); font-size:12px; padding:5px 10px; border-radius:8px; background:var(--ink-2); border:1px solid var(--line); color:var(--bone-2); }
.aja{ padding:14px; border-radius:var(--radius); background:linear-gradient(150deg, var(--gold-glow), var(--surface)); border:1px solid rgba(232,176,75,.25); }
.aja .lbl{ display:flex; align-items:center; gap:6px; font-family:var(--f-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin-bottom:7px; }
.aja p{ margin:0; color:var(--bone); font-size:14.5px; line-height:1.5; }
.obj-pair{ padding:14px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--line-soft); }
.obj-pair .o{ color:var(--bone); font-size:14px; font-style:italic; }
.obj-pair .arrow{ color:var(--jade); font-family:var(--f-mono); margin:8px 0 6px; font-size:11px; letter-spacing:.1em; }
.obj-pair .a{ color:var(--bone-2); font-size:14px; line-height:1.5; }
.pitch1{ padding:16px; border-radius:var(--radius); background:linear-gradient(160deg,var(--ink-2),var(--surface)); border:1px solid var(--line); position:relative; }
.pitch1::before{ content:"“"; position:absolute; top:2px; left:10px; font-family:var(--f-display); font-size:54px; color:var(--gold); opacity:.22; line-height:1; }
.pitch1 p{ margin:0; color:var(--bone); font-size:15px; line-height:1.55; position:relative; }
.roi-line{ display:flex; align-items:flex-start; gap:10px; padding:13px 14px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--line-soft); }
.roi-line .ri{ color:var(--jade); flex:0 0 auto; margin-top:1px; }
.roi-line p{ margin:0; font-size:14px; color:var(--bone-2); line-height:1.5; }

/* ===================== BATTLECARD ===================== */
.bc-list{ display:flex; flex-direction:column; gap:10px; }
.bc-row{ display:flex; align-items:center; gap:13px; padding:14px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--line-soft); width:100%; text-align:left; }
.bc-row:active{ transform:scale(.985); transition:.1s; }
.bc-chip{ flex:0 0 auto; width:14px;height:14px;border-radius:5px; box-shadow:0 0 0 3px rgba(255,255,255,.04); }
.bc-row .bc-c{ flex:1; min-width:0; }
.bc-row .bc-c b{ font-family:var(--f-display); font-weight:700; font-size:15.5px; display:block; }
.bc-row .bc-c small{ color:var(--dim); font-size:12.5px; }
.bc-hero{ padding:18px 18px 16px; border-radius:var(--radius-lg); border:1px solid var(--line); position:relative; overflow:hidden; }
.bc-hero .stripe{ position:absolute; left:0; top:0; bottom:0; width:5px; }
.wedge{ padding:14px; border-radius:var(--radius); background:var(--jade-soft); border:1px solid rgba(79,178,134,.28); }
.wedge .lbl{ font-family:var(--f-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--jade); margin-bottom:7px; }
.gap-li{ display:flex; gap:9px; align-items:flex-start; margin-bottom:8px; font-size:14px; color:var(--bone-2); line-height:1.45; }
.gap-li .x{ color:var(--danger); flex:0 0 auto; margin-top:2px; }
.str-li{ display:flex; gap:9px; align-items:flex-start; margin-bottom:8px; font-size:14px; color:var(--bone-2); line-height:1.45; }
.str-li .c{ color:var(--steel); flex:0 0 auto; margin-top:2px; }
.frase-box{ padding:15px; border-radius:var(--radius); background:linear-gradient(160deg,var(--ink-2),var(--surface)); border:1px dashed rgba(232,176,75,.4); }
.frase-box .lbl{ font-family:var(--f-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin-bottom:7px; }
.frase-box p{ margin:0; color:var(--bone); font-size:15px; line-height:1.55; font-style:italic; }

/* método pasos */
.metodo-step{ display:flex; gap:13px; padding:14px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--line-soft); }
.metodo-step .n{ flex:0 0 auto; width:28px;height:28px;border-radius:9px; display:grid;place-items:center; font-family:var(--f-mono); font-weight:700; font-size:13px; color:var(--ink); background:var(--gold); }
.metodo-step .mc b{ display:block; font-size:14.5px; color:var(--bone); font-weight:700; margin-bottom:3px; }
.metodo-step .mc p{ margin:0; font-size:13.5px; color:var(--bone-2); line-height:1.5; }

/* ===================== OBJECIONES ===================== */
.obj-acc{ background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden; }
.obj-acc + .obj-acc{ margin-top:10px; }
.obj-q{ width:100%; text-align:left; padding:15px; display:flex; align-items:center; gap:12px; }

'use strict';

/* ===========================================================================
   CONFIGURACIÓN DE LA NUBE (Supabase)
   1) Crea un proyecto gratis en https://supabase.com
   2) Settings → API: copia "Project URL" y la llave "anon public"
   3) Pégalas aquí abajo. Mientras digan TU-..., la app funciona SOLO local.

const ZENTOR_CONFIG = {

};

/* ---------- almacenamiento defensivo (persiste si se hospeda; nunca truena) ---------- */
const Store = (() => {
  let mem = {};
  let ok = false;
  try { const k='__z'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); ok = true; } catch(e){ ok = false; }
  return {
    get(k, d){ try { if(ok){ const v=window.localStorage.getItem(k); return v==null?d:JSON.parse(v); } } catch(e){} return (k in mem)?mem[k]:d; },
    set(k, v){ try { if(ok){ window.localStorage.setItem(k, JSON.stringify(v)); return; } } catch(e){} mem[k]=v; }
  };
})();

/* ---------- estado ---------- */
const State = {
  tab: 'inicio',
  studied: Store.get('z.studied', {}),     // {chapterId:true}
  checks: Store.get('z.checks', {}),       // checklist cierre
  ficha: null, battlecard: null,
  pitchSeg: '30s',
  saveStudied(){ Store.set('z.studied', this.studied); Cloud.queuePush(); },

};

/* ROI — calculadora viva */
const ROIv = Store.get('z.roi', null) || (()=>{ const o={};
  DATA.roiModel.buckets.forEach(b=>o['b_'+b.id]=b.def);
  DATA.roiModel.inputs.forEach(i=>o['i_'+i.id]=i.def); return o; })();
function saveRoi(){ Store.set('z.roi', ROIv); Cloud.queuePush(); }
function roiCompute(){
  const inv=+ROIv.i_inv||0, carteraStock=+ROIv.i_cartera||0, costo=+ROIv.i_costoZentor||0;
  const merma   = inv * (+ROIv.b_merma||0)/100;
  const cartera = carteraStock * (+ROIv.b_cartera||0)/100 * 0.03; // 3%/mes: costo del dinero atorado
  const horas   = (+ROIv.b_horas||0) * 180;
  const desab   = (+ROIv.b_desabasto||0);
  const total   = merma + cartera + horas + desab;
  const ratio   = costo>0 ? total/costo : 0;
  return { merma, cartera, horas, desab, total, costo, ratio };
}
function roiOutHTML(){
  const r = roiCompute();
  const gana = r.total > r.costo;
  return `
    <div class="roi-result">
      <div class="rlabel">Se le fuga al mes (estimado)</div>
      <div class="rbig" id="roi-big">${fmt(r.total)}</div>
      <div class="rsub">vs. ${fmt(r.costo)} que cuesta Zentor al mes</div>
      <div class="roi-break">
        <div class="rb"><span>Merma / caducidad / robo</span><b>${fmt(r.merma)}</b></div>
        <div class="rb"><span>Dinero atorado en la calle (3%/mes)</span><b>${fmt(r.cartera)}</b></div>
        <div class="rb"><span>Horas de captura ($180/h)</span><b>${fmt(r.horas)}</b></div>
        <div class="rb"><span>Venta perdida por desabasto</span><b>${fmt(r.desab)}</b></div>
      </div>
    </div>
    <div class="roi-verdict">
      ${gana
        ? `Zentor cuesta <b>${fmt(r.costo)}</b> y el problema le cuesta <b>${fmt(r.total)}</b> al mes. <b>Se paga ${r.ratio.toFixed(1)}× solo.</b> Cambiar hoy conviene aunque pierda lo ya pagado.`
        : `Con estos números el ahorro aún no cubre la mensualidad. Sé honesto: aquí se vende por <b>control, visibilidad y cumplimiento</b>, no por ahorro directo — o ajusta los supuestos con el dueño.`}
    </div>`;
}
function roiTool(){
  const sliders = DATA.roiModel.buckets.map(b => {
    const key='b_'+b.id, v=ROIv[key];
    const disp = b.kind==='pct'?`${v}%` : b.kind==='horas'?`${v} h` : fmt(v);
    return `<div class="calc-field">

  const nums = DATA.roiModel.inputs.map(i => {

      <span class="cbx">${icon('check')}</span><span class="ctxt">${esc(t)}</span>
    </button>`).join('');
  const done = DATA.checklist.filter((_,i)=>State.checks[i]).length;
  const html = `
    ${dhead('Parte VI','Checklist de cierre')}
    <div class="pad" style="padding-top:8px">
      <div class="note-strip"><span class="ns-i">${icon('checklist')}</span>
        <div>Antes de salir de la visita — ${done}/${DATA.checklist.length} listos.</div></div>
      <div class="rowlist" style="margin-top:14px">${items}</div>
    </div>`;
  return { html, ctx:'Checklist' };
}

/* ---------- BUSCAR ---------- */
const strip = h => String(h).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
const SEARCH_INDEX = (()=>{
  const ix=[];
  [DATA.parteI,DATA.parteII,DATA.parteV].forEach(p=>p.caps.forEach(c=>
    ix.push({ cat:'Capítulos', title:'Cap. '+c.n+' · '+c.t, sub:'Parte '+p.n, hay:(c.t+' '+strip(c.html)).toLowerCase(), k:'cap', a:p.id, b:c.id })));
  DATA.fichas.forEach(f=>
    ix.push({ cat:'Fichas por giro', title:f.nombre, sub:f.sub, hay:(f.nombre+' '+f.sub+' '+f.vocab.join(' ')+' '+f.dolor+' '+f.pitch).toLowerCase(), k:'ficha', a:f.id }));
  DATA.battlecards.forEach(b=>
    ix.push({ cat:'Battlecards', title:b.nombre, sub:b.tagline, hay:(b.nombre+' '+b.tagline+' '+b.queEs+' '+b.huecos.join(' ')+' '+b.frase).toLowerCase(), k:'bc', a:b.id }));
  DATA.objeciones.forEach((o,i)=>
    ix.push({ cat:'Objeciones', title:'“'+o.o+'”', sub:'De fondo: '+o.real, hay:(o.o+' '+o.real+' '+o.a).toLowerCase(), k:'tool', a:'objeciones' }));
  DATA.glosario.forEach(g=>
    ix.push({ cat:'Glosario', title:g.t, sub:g.c, hay:(g.t+' '+g.c).toLowerCase(), k:'tool', a:'glosario' }));
  return ix;
})();
function hl(text,q){
  if(!q) return esc(text);
  const t=esc(text), needle=q.toLowerCase(), low=t.toLowerCase();
  let out='', i=0, p;
  while((p=low.indexOf(needle,i))!==-1){ out+=t.slice(i,p)+'<span class="hl">'+t.slice(p,p+needle.length)+'</span>'; i=p+needle.length; }
  return out+t.slice(i);
}
function searchResultsHTML(q){
  q=(q||'').trim();
  if(!q) return `<div class="empty">${icon('search')}<b>Busca en toda la Biblia</b>Capítulos, fichas, competidores, objeciones y glosario.</div>`;
  const ql=q.toLowerCase();
  const hits=SEARCH_INDEX.filter(x=>x.hay.includes(ql));
  if(!hits.length) return `<div class="empty">${icon('search')}<b>Sin resultados para “${esc(q)}”</b>Prueba otra palabra (giro, competidor, dolor…).</div>`;
  const cats={}; hits.forEach(h=>{ (cats[h.cat]=cats[h.cat]||[]).push(h); });
  return Object.keys(cats).map(cat=>`
    <div class="search-cat">${esc(cat)} · ${cats[cat].length}<span class="ln"></span></div>
    <div class="rowlist">
      ${cats[cat].map(h=>`
        <button class="row card-btn" data-act="go" data-k="${h.k}" data-a="${h.a||''}" data-b="${h.b||''}">
          <span class="rc"><b>${hl(h.title,q)}</b><small>${hl(h.sub,q)}</small></span>${chevRow()}
        </button>`).join('')}
    </div>`).join('');
}
function viewBuscar(){
  return `
    <div class="searchbar">
      <div class="searchbox" id="sbox">
        ${icon('search')}
        <input id="q" data-search placeholder="Buscar giro, competidor, objeción…" autocomplete="off" value="${esc(State._q||'')}">
        <button class="clr" data-act="clear-q" ${State._q?'':'style="visibility:hidden"'}>${icon('x')}</button>
      </div>
    </div>
    <div class="pad-x"><div id="results">${searchResultsHTML(State._q||'')}</div></div>`;
}

/* ===========================================================================
   RENDER dispatcher
   =========================================================================== */
function render(){
  renderTabbar();
  let html='', ctx='del vendedor';
  const s=Nav.screen;
  if(s){
    let r;
    if(s.kind==='parte') r=partRender(s.id);
    else if(s.kind==='cap') r=capRender(s.partId,s.capId);
    else if(s.kind==='tool') r=toolRender(s.id);
    else if(s.kind==='account') r=accountRender();
    html=r.html; ctx=r.ctx;
  } else {
    if(State.tab==='inicio'){ html=viewInicio(); ctx='del vendedor'; }
    else if(State.tab==='biblia'){ html=viewBiblia(); ctx='las 6 partes'; }
    else if(State.tab==='campo'){ html=viewCampo(); ctx='tu arsenal'; }
    else if(State.tab==='buscar'){ html=viewBuscar(); ctx='buscar'; }
  }
  $main.innerHTML = `<div class="view">${html}</div>`;
  $topctx.textContent = ctx;
  postRender();
}
function postRender(){
  if(State.tab==='buscar' && !Nav.screen){
    const q=document.getElementById('q');
    if(q){ q.focus(); const v=q.value; q.value=''; q.value=v; }
  }
}

/* ===========================================================================
   EVENTOS (delegación)
   =========================================================================== */
function back(){
  const s=Nav.screen; if(!s) return;
  if(s.kind==='tool' && s.id==='battlecards' && State.battlecard){ State.battlecard=null; render(); scrollTop(); return; }
  if(s.kind==='cap'){ Nav.screen={kind:'parte',id:s.partId}; }
  else if(s.kind==='parte'){ Nav.screen=null; State.tab='biblia'; }
  else if(s.kind==='tool'){ Nav.screen=null; State.tab='campo'; }
  else if(s.kind==='account'){ Nav.screen=null; State.tab='inicio'; }
  render(); scrollTop();
}
function doGo(k,a,b){
  if(k==='cap'){ State.tab='biblia'; Nav.screen={kind:'cap',partId:a,capId:b}; }
  else if(k==='ficha'){ State.ficha=a; State.tab='campo'; Nav.screen={kind:'tool',id:'fichas'}; }
  else if(k==='bc'){ State.battlecard=a; State.tab='campo'; Nav.screen={kind:'tool',id:'battlecards'}; }
  else if(k==='tool'){ State.tab='campo'; Nav.screen={kind:'tool',id:a}; }
  render(); scrollTop();
}

document.addEventListener('click', (e)=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act;
  switch(act){
    case 'tab': setTab(t.dataset.tab); break;
    case 'goto-search': State.tab='buscar'; Nav.screen=null; render(); scrollTop(); break;
    case 'goto-account': Nav.screen={kind:'account'}; render(); scrollTop(); break;
    case 'login-open': showLogin(); break;
    case 'auth-send': doSendLink(); break;
    case 'acct-save-name': {
      const inp=document.getElementById('acct-name');
      if(inp){ const btn=t; btn.disabled=true; const orig=btn.textContent; btn.textContent='Guardando…';
        Cloud.saveName((inp.value||'').trim()).then(()=>{ btn.textContent='Guardado ✓'; setTimeout(()=>{ btn.disabled=false; btn.textContent=orig; },1400); })
          .catch(()=>{ btn.disabled=false; btn.textContent=orig; }); }
      break;
    }
    case 'acct-signout': Cloud.signOut().then(()=>{ Cloud.team=null; showLogin(); render(); }); break;
    case 'goto-tool': State.tab='campo'; Nav.screen={kind:'tool',id:t.dataset.id}; render(); scrollTop(); break;
    case 'parte': go({kind:'parte',id:t.dataset.id}); break;
    case 'cap': go({kind:'cap',partId:t.dataset.part,capId:t.dataset.cap}); break;
    case 'tool': go({kind:'tool',id:t.dataset.id}); break;
    case 'ficha': State.ficha=t.dataset.id; render(); break;
    case 'bc': State.battlecard=t.dataset.id; render(); scrollTop(); break;
    case 'back': back(); break;
    case 'go': doGo(t.dataset.k,t.dataset.a,t.dataset.b); break;
    case 'pitch-seg': State.pitchSeg=t.dataset.seg; render(); break;
    case 'toggle-study': {
      const id=t.dataset.cap;
      if(State.studied[id]) delete State.studied[id]; else State.studied[id]=true;
      State.saveStudied(); render();
      break;
    }
    case 'check': {
      const i=t.dataset.i;
      if(State.checks[i]) delete State.checks[i]; else State.checks[i]=true;
      State.saveChecks(); render();
      break;
    }
    case 'obj': {
      const acc=t.closest('.obj-acc');
      const open=acc.classList.toggle('open');
      const body=acc.querySelector('.obj-a');
      body.style.maxHeight = open ? body.firstElementChild.scrollHeight+24+'px' : '0px';
      break;
    }
    case 'clear-q': {
      State._q=''; const r=document.getElementById('results'); if(r) r.innerHTML=searchResultsHTML('');
      const q=document.getElementById('q'); if(q){ q.value=''; q.focus(); }
      const clr=t; clr.style.visibility='hidden';
      break;
    }
    case 'timer-start': toggleTimer(); break;
    case 'timer-reset': resetTimer(); break;
  }
});

document.addEventListener('input', (e)=>{
  const el=e.target;
  if(el.dataset && el.dataset.roi){
    const key=el.dataset.roi; ROIv[key]=+el.value;
    if(el.dataset.kind){
      const span=document.getElementById('v_'+key);
      if(span) span.textContent = el.dataset.kind==='pct'?`${el.value}%` : el.dataset.kind==='horas'?`${el.value} h` : fmt(+el.value);
    }
    const out=document.getElementById('roi-out'); if(out) out.innerHTML=roiOutHTML();
    saveRoi();
    return;
  }
  if(el.id==='q'){
    State._q=el.value;
    const r=document.getElementById('results'); if(r) r.innerHTML=searchResultsHTML(el.value);
    const clr=document.querySelector('[data-act="clear-q"]'); if(clr) clr.style.visibility=el.value?'visible':'hidden';
  }
});

document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && e.target && e.target.id==='auth-email'){ e.preventDefault(); doSendLink(); }
});

/* cronómetro de visita */
let _tInt=null, _tSec=0;
function paintTimer(){ const el=document.getElementById('vtimer'); if(el) el.textContent=`${String(Math.floor(_tSec/60)).padStart(2,'0')}:${String(_tSec%60).padStart(2,'0')}`; }
function toggleTimer(){
  const btn=document.getElementById('tStart');
  if(_tInt){ clearInterval(_tInt); _tInt=null; if(btn) btn.textContent='▶'; }
  else { _tInt=setInterval(()=>{ _tSec++; paintTimer(); },1000); if(btn) btn.textContent='❚❚'; }
}
function resetTimer(){ if(_tInt){ clearInterval(_tInt); _tInt=null; } _tSec=0; paintTimer(); const b=document.getElementById('tStart'); if(b) b.textContent='▶'; }

/* ===========================================================================
   CUENTA Y NUBE (Supabase) — acceso por magic link + sincronización de avances
   Degradación elegante: sin configurar, la app sigue funcionando 100% offline.
   =========================================================================== */
const Cloud = (() => {
  const cfg = (typeof ZENTOR_CONFIG !== 'undefined') ? ZENTOR_CONFIG : {};
  const hasLib = !!(window.supabase && window.supabase.createClient);
  const looksReal = v => v && !/TU[-_]/.test(v);
  const configured = hasLib && looksReal(cfg.SUPABASE_URL) && looksReal(cfg.SUPABASE_ANON_KEY);
  let sb = null;
  if (configured) { try { sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY); } catch(e){ sb = null; } }

  return {
    enabled: !!sb,
    user: null,
    profile: null,
    team: null,
    _timer: null,
    _onChange: null,

    isAdmin(){ return !!(this.profile && this.profile.role === 'admin'); },

    async init(onChange){
      if(!sb) return false;
      this._onChange = onChange;
      sb.auth.onAuthStateChange((event, session) => {
        this.user = session ? session.user : null;
        if(this._onChange) setTimeout(() => this._onChange(event, session), 0);
      });
      const { data } = await sb.auth.getSession();
      this.user = data.session ? data.session.user : null;
      return !!this.user;
    },

    async sendMagicLink(email){
      if(!sb) throw new Error('La nube no está configurada');
      const redirect = window.location.href.split('#')[0];
      const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirect } });
      if(error) throw error;
    },

    async signOut(){
      if(!sb) return;
      await sb.auth.signOut();
      this.user = null; this.profile = null; this.team = null;
    },

    async loadProfile(){
      if(!sb || !this.user) return null;
      let { data } = await sb.from('profiles').select('*').eq('id', this.user.id).maybeSingle();
      if(!data){
        const ins = await sb.from('profiles').insert({ id:this.user.id, email:this.user.email }).select().maybeSingle();
        data = ins.data;
      }
      this.profile = data;
      return data;
    },

    async saveName(name){
      if(!sb || !this.user) return;
      await sb.from('profiles').update({ full_name:name }).eq('id', this.user.id);
      if(this.profile) this.profile.full_name = name;
    },

    /* baja la nube y la fusiona con lo local (lo aprendido nunca se pierde) */
    async syncDown(){
      if(!sb || !this.user) return;
      const { data } = await sb.from('progress').select('*').eq('user_id', this.user.id).maybeSingle();
      const cStudied = (data && data.studied) || {};
      const cChecks  = (data && data.checks)  || {};
      const cRoi     = (data && data.roi)     || null;
      State.studied = Object.assign({}, cStudied, State.studied);
      State.checks  = Object.assign({}, cChecks,  State.checks);
      Store.set('z.studied', State.studied);
      Store.set('z.checks',  State.checks);
      if(cRoi){ Object.keys(cRoi).forEach(k => { if(ROIv[k] == null) ROIv[k] = cRoi[k]; }); Store.set('z.roi', ROIv); }
      await this.pushNow();
    },

    queuePush(){
      if(!sb || !this.user) return;
      clearTimeout(this._timer);
      this._timer = setTimeout(() => this.pushNow(), 800);
    },

    async pushNow(){
      if(!sb || !this.user) return;
      try{
        await sb.from('progress').upsert({
          user_id: this.user.id,
          studied: State.studied,
          checks:  State.checks,
          roi:     ROIv,
          updated_at: new Date().toISOString()
        }, { onConflict:'user_id' });
      }catch(e){ /* sin red: se reintenta en el próximo guardado */ }
    },

    async loadTeam(){
      if(!sb || !this.isAdmin()) return [];
      const total = STUDY_CAPS.length;
      const { data:profiles } = await sb.from('profiles').select('id,email,full_name,role');
      const { data:progs }    = await sb.from('progress').select('user_id,studied,updated_at');
      const byId = {}; (progs||[]).forEach(p => byId[p.user_id] = p);
      this.team = (profiles||[]).map(p => {
        const pr = byId[p.id];
        const done = pr && pr.studied ? STUDY_CAPS.filter(c => pr.studied[c.id]).length : 0;
        return {
          name:  p.full_name || (p.email||'').split('@')[0] || 'Vendedor',
          email: p.email, role: p.role,
          done, total, pct: total ? Math.round(done/total*100) : 0,
          updated: pr && pr.updated_at ? pr.updated_at : null
        };
      }).sort((a,b) => b.pct - a.pct);
      return this.team;
    }
  };
})();

/* ---------- overlay de acceso ---------- */
function showLogin(){ const el=document.getElementById('auth'); if(el) el.style.display='flex'; }
function hideLogin(){ const el=document.getElementById('auth'); if(el) el.style.display='none'; }
async function doSendLink(){
  const inp=document.getElementById('auth-email');
  const msg=document.getElementById('auth-msg');
  const btn=document.getElementById('auth-send');
  const email=(inp.value||'').trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.textContent='Escribe un correo válido.'; msg.className='auth-msg err'; return; }
  btn.disabled=true; msg.textContent='Enviando…'; msg.className='auth-msg';
  try{
    await Cloud.sendMagicLink(email);
    msg.textContent='Listo ✓ Revisa tu correo y abre el enlace para entrar.';
    msg.className='auth-msg ok';
  }catch(e){
    msg.textContent='No se pudo enviar: '+(e.message||e);
    msg.className='auth-msg err';
  }
  btn.disabled=false;
}

/* ---------- vista de cuenta ---------- */
function fechaRel(iso){
  if(!iso) return 'sin actividad';
  const d=new Date(iso), now=new Date(), days=Math.floor((now-d)/86400000);
  if(days<=0) return 'hoy';
  if(days===1) return 'ayer';
  if(days<30) return `hace ${days} d`;
  return d.toLocaleDateString('es-MX');
}
function accountRender(){
  const ctx='mi cuenta';
  const total = STUDY_CAPS.length;
  const done  = STUDY_CAPS.filter(c => State.studied[c.id]).length;
  const pct   = total ? Math.round(done/total*100) : 0;

  if(!Cloud.enabled){
    return { ctx, html: dhead('Cuenta','Modo local') + `<div class="pad-x">
      <div class="card"><div class="note">
        Tus avances se guardan <b>solo en este dispositivo</b>. Para tener cuenta, sincronizar
        entre teléfonos y que el administrador vea el progreso del equipo, configura Supabase
        en <b>ZENTOR_CONFIG</b> (ver README).
      </div></div>
      <div class="card"><div class="prog-big"><b>${done}/${total}</b><span>capítulos estudiados · ${pct}%</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div></div>
    </div>` };
  }

  if(!Cloud.user){
    return { ctx, html: dhead('Cuenta','Inicia sesión') + `<div class="pad-x">
      <div class="card"><div class="note">Entra con tu correo para guardar y sincronizar tus avances.</div></div>
      <button class="btn" data-act="login-open">Iniciar sesión</button>
    </div>` };
  }

  const p = Cloud.profile || {};
  let html = dhead('Cuenta','Mi cuenta') + `<div class="pad-x">`;
  html += `<div class="card acct-card">
    <div class="acct-row kv"><span class="k">Correo</span><span class="v">${esc(p.email || Cloud.user.email || '')}</span></div>
    ${Cloud.isAdmin() ? '<div class="acct-row kv"><span class="k">Rol</span><span class="v">Administrador</span></div>' : ''}
    <div class="acct-row"><span class="k">Nombre</span>
      <input id="acct-name" class="acct-input" value="${esc(p.full_name||'')}" placeholder="Tu nombre"></div>
    <button class="btn" data-act="acct-save-name">Guardar nombre</button>
  </div>`;
  html += `<div class="card"><div class="prog-big"><b>${done}/${total}</b><span>capítulos estudiados · ${pct}%</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div></div>`;

  if(Cloud.isAdmin()){
    html += `<div class="sec-title">Equipo</div>`;
    if(Cloud.team){
      html += `<div class="card">` + (Cloud.team.length ? Cloud.team.map(m => `
        <div class="team-row">
          <div class="team-top">
            <div class="tm-id"><b>${esc(m.name)}</b><small>${esc(m.email||'')}${m.role==='admin'?' · admin':''} · ${fechaRel(m.updated)}</small></div>
            <div class="tm-pct"><b>${m.pct}%</b><small>${m.done}/${m.total}</small></div>
          </div>
          <div class="bar sm"><i style="width:${m.pct}%"></i></div>
        </div>`).join('') : '<div class="muted">Aún no hay vendedores registrados.</div>') + `</div>`;
    } else {
      html += `<div class="card"><div class="muted">Cargando equipo…</div></div>`;
      setTimeout(() => { Cloud.loadTeam().then(() => { if(Nav.screen && Nav.screen.kind==='account') render(); }); }, 0);
    }
  }

  html += `<button class="btn ghost" data-act="acct-signout">Cerrar sesión</button></div>`;
  return { ctx, html };
}

/* ===========================================================================
   INIT
   =========================================================================== */
async function init(){
  if(Cloud.enabled){
    const onAuth = async (event) => {
      if(event === 'INITIAL_SESSION') return;          // ya lo maneja el arranque
      if(event === 'SIGNED_OUT'){ showLogin(); render(); return; }
      if(Cloud.user){
        try{ await Cloud.loadProfile(); await Cloud.syncDown(); }catch(e){}
        hideLogin(); render();
      }
    };
    try{
      const logged = await Cloud.init(onAuth);
      if(logged){ try{ await Cloud.loadProfile(); await Cloud.syncDown(); }catch(e){} hideLogin(); }
      else { showLogin(); }
    }catch(e){ /* si falla la nube, seguimos en local */ }
  }
  render();
  const splash=document.getElementById('splash');
  const hide=()=>{ if(splash) splash.classList.add('gone'); };
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) setTimeout(hide,400);
  else setTimeout(hide,1700);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
